name: reconcile-prs

# GitHub-native SWE pipeline, reconciler leg (ported from antondelafuente/automated-researcher#431 via agentic-engineering#63).
# GitHub creates NO `pull_request` workflow run when a PR is unmergeable at event time (the run targets
# refs/pull/N/merge, which can't be built while the PR conflicts with base) -- deterministic platform
# behavior, not dropped events. In wave operation this is the dominant silence mode: a sibling merge lands
# on main, a still-open same-area PR becomes conflicted, and from that moment every `opened`/`synchronize`
# event on it silently produces nothing until a human/dispatcher notices. This scheduled, level-triggered
# reconciler walks open bot-authored PRs every ~10 minutes and repairs the two resulting states itself:
#   - `mergeable == CONFLICTING`: post the allowlisted `@claude-code-engineer` resolution-dispatch mention
#     (address-review.yml re-dispatches the implementor onto the SAME branch to merge origin/main, resolve,
#     and push -- which fires `synchronize` on the now-buildable merge ref). Round-budgeted: escalates to
#     `needs-senior-engineer` instead of nudging forever if the head never moves (the in-flight judgment
#     layer looks closer at why plain resolution-dispatch isn't landing and hands exact guidance, or
#     escalates to `needs-human` itself if it can't). The label alone would never summon it here -- a
#     conflicted PR has no mergeable ref, so GitHub fires no `pull_request` run for senior-engineer.yml's
#     `labeled` trigger to catch -- so this reconciler also dispatches it directly via `workflow_dispatch`.
#   - `mergeable == MERGEABLE` but the head has no completed codex review yet: re-fire review-on-pr.yml via
#     its `workflow_dispatch` actuator (the residual true-event-loss case, if one exists).
# See AGENTS.md "GitHub-native SWE pipeline (BYOK)" for the full trust model this implements.
#
# antondelafuente/automated-researcher#513: GitHub emits no event when a PR becomes conflicted, but the event that CAUSES
# a conflict IS observable -- every merge is a push to main. The `push` trigger below is the primary,
# low-latency detector (a sibling merge lands, this fires within ~a minute); the cron stays as the backstop
# for lost events and crashed runs. Because `mergeable` is computed lazily, a push-triggered run can see
# `UNKNOWN` (GitHub's background job hasn't finished) where the cron -- ticking minutes later -- would
# already see the settled value; the reconcile step below retries UNKNOWN a few times before giving up for
# the tick, rather than treating it as "fine" (which would let a genuinely CONFLICTING PR go unresolved).
# The `concurrency` group below serializes overlapping sweeps: a merge burst can fire several pushes within
# seconds, and two sweeps racing over the same PR list could double-dispatch a resolution round.

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

concurrency:
  group: reconcile-prs
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reconcile:
    name: reconcile
    runs-on: ubuntu-latest
    steps:
      # Checkout runs FIRST (same rationale as the other pipeline workflows): the reconcile step below
      # sources the canonical-login helper from the working tree, which must exist before it's sourced.
      - name: Checkout base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          persist-credentials: false

      # A single minted token covers every gh call this job makes, read AND write alike: every mutation
      # (mention comment, label, workflow_dispatch) needs it anyway, and address-review.yml's comment-author
      # allowlist (["antondelafuente","codex-engineer[bot]","app/codex-engineer","senior-engineer-agent[bot]","app/senior-engineer-agent"])
      # deliberately EXCLUDES the claude engineer bot, so the resolution-dispatch mention specifically must
      # be posted as this identity.
      - name: Mint codex engineer App token
        id: mint_codex_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # actions/create-github-app-token v3.2.0
        with:
          app-id: ${{ secrets.CODEX_APP_ID }}
          private-key: ${{ secrets.CODEX_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Reconcile open bot PRs
        env:
          GH_TOKEN: ${{ steps.mint_codex_token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          source "$GITHUB_WORKSPACE/.github/scripts/canonical-login.sh"

          # Round budget before a CONFLICTING PR with no progress escalates to needs-senior-engineer,
          # rather than being re-nudged forever.
          BUDGET=3
          CONFLICT_MARKER="Reconciler: PR conflicts with main"
          REVIEW_MARKER="Reconciler: re-firing review actuator"
          # Comfortably above address-review.yml's 45-minute Claude-CLI timeout (conflict path) / a codex
          # review's typical few-minute runtime (review-actuator path): a dispatch this recent against the
          # SAME head is treated as still in flight rather than re-dispatched or counted as a fresh round.
          CONFLICT_GRACE_SECONDS=$((55 * 60))
          REVIEW_GRACE_SECONDS=$((30 * 60))
          # Comfortably above senior-engineer.yml's own 30-minute CLI timeout: a stranded needs-senior-engineer
          # label (its dispatch or its rollback failed -- agentic-engineering#65 rounds 9-10) is left alone
          # for at least this long before this sweep re-dispatches it, so a summons that is still genuinely
          # running isn't raced.
          SENIOR_ENGINEER_GRACE_SECONDS=$((45 * 60))
          now_epoch=$(date -u +%s)

          # Lazy-mergeability retry (antondelafuente/automated-researcher#513): right after a push, GitHub's mergeability
          # computation is still running in the background and the API reports UNKNOWN until it finishes.
          # A few short retries give a push-triggered run a real chance to see the settled CONFLICTING/
          # MERGEABLE value itself, instead of routinely deferring to the next cron tick and losing most
          # of the push trigger's latency win.
          MERGEABILITY_RETRY_ATTEMPTS=3
          MERGEABILITY_RETRY_SECONDS=10

          # last_marker_comment REPO PR_NUMBER MARKER -> most recent matching comment (or "null"), via the
          # same canon_login duplication idiom review-on-pr.yml's history step uses (a jq filter can't
          # source the bash helper).
          last_marker_comment() {
            local n="$1" marker="$2"
            gh api "repos/$REPO/issues/$n/comments" --paginate | jq -s --arg marker "$marker" '
              def canon_login: if startswith("app/") then (.[4:] + "[bot]") else . end;
              add // [] | map(select(((.user.login | canon_login) == "codex-engineer[bot]") and ((.body // "") | startswith($marker))))
                | sort_by(.created_at) | last
            '
          }

          handle_conflicted() {
            local n="$1" head="$2"
            local short="${head:0:8}"

            # This function runs inside `if ! handle_conflicted ...; then` below, which disables
            # errexit for its duration -- an unchecked read failure here would fall through to the
            # empty-string branch below and be indistinguishable from "no marker exists", triggering
            # a duplicate resolution dispatch. Check the read's exit status explicitly and skip this
            # PR for this tick on failure; the reconciler re-runs in ~10 minutes, so doing nothing is
            # the safe direction. Only a successful-but-empty read means "no marker".
            local last
            if ! last=$(last_marker_comment "$n" "$CONFLICT_MARKER"); then
              echo "::warning::PR #$n: reading conflict-marker history failed; skipping this tick"
              return 1
            fi

            local round=1
            if [ "$last" != "null" ] && [ -n "$last" ]; then
              local prev_sha prev_round prev_ts elapsed
              prev_sha=$(jq -r '.body' <<<"$last" | grep -oE 'head [0-9a-f]{8}' | head -1 | awk '{print $2}')
              prev_round=$(jq -r '.body' <<<"$last" | grep -oE 'round [0-9]+' | head -1 | awk '{print $2}')
              prev_ts=$(jq -r '.created_at' <<<"$last")
              if [ "$prev_sha" = "$short" ] && [ -n "$prev_round" ]; then
                elapsed=$(( now_epoch - $(date -u -d "$prev_ts" +%s) ))
                if [ "$elapsed" -lt "$CONFLICT_GRACE_SECONDS" ]; then
                  echo "PR #$n: conflict-resolution round $prev_round dispatched ${elapsed}s ago against the same head; treating as still in flight, skipping this tick"
                  return
                fi
                round=$((prev_round + 1))
              fi
            fi

            if [ "$round" -gt "$BUDGET" ]; then
              echo "PR #$n: conflicted with no progress after $((round - 1)) reconciler dispatch(es); escalating to needs-senior-engineer"
              gh pr comment "$n" --repo "$REPO" --body "Reconciler: PR has stayed conflicted with main across $((round - 1)) resolution-dispatch round(s) with no new commit landing (still at head $short). Escalating to \`needs-senior-engineer\` rather than continuing to nudge."
              # senior-engineer.yml's only event trigger is `pull_request: labeled`, and GitHub creates no
              # `pull_request` run against a still-CONFLICTING PR (no mergeable ref exists to build), so a
              # labeled event here would never actually fire the adjudicator (agentic-engineering#65 round
              # 5, P0). Its `workflow_dispatch` input (pr_number) is the reliable summon for a
              # merge-ref-less PR; dispatch it directly with this same token (CODEX_APP's Actions:write,
              # already documented in AGENTS.md for this job's review-actuator re-fire below). The
              # `summoned_by=reconciler` input marks this as a real summons for senior-engineer.yml's own
              # loop guard to run against, rather than being exempted the way a bare dispatch is
              # (agentic-engineering#65 round 7, P0); the guard itself now counts adjudication comments, not
              # this marker or the label (round 10). Label BEFORE dispatching, everywhere this pipeline pairs
              # a label with a dispatch of the same summons: the label is this run's visible state marker,
              # so the dispatch should observe it already recorded rather than race a run that starts before
              # the label lands (agentic-engineering#65 round 8, P0 -- supersedes round 6's dispatch-first
              # ordering). Roll the label back on a best-effort basis if the dispatch itself then fails; a
              # failed rollback is not chased further here -- a needs-senior-engineer label with no
              # newer adjudication comment past its grace window is re-dispatched by this sweep's own
              # conditional skip (see handle_stranded_senior_engineer above), so neither a failed dispatch
              # nor a failed rollback strands this PR (agentic-engineering#65 round 10, resolving rounds
              # 9-10's P0/P1).
              if ! gh pr edit "$n" --repo "$REPO" --add-label needs-senior-engineer; then
                echo "::warning::PR #$n: failed to add needs-senior-engineer label; not dispatching this tick so the next tick retries"
                return 1
              fi
              if ! gh workflow run senior-engineer.yml --repo "$REPO" -f "pr_number=$n" -f "summoned_by=reconciler"; then
                echo "::warning::PR #$n: labeled needs-senior-engineer but workflow_dispatch of senior-engineer.yml failed; removing the label so the next tick retries"
                if ! gh pr edit "$n" --repo "$REPO" --remove-label needs-senior-engineer; then
                  echo "::warning::PR #$n: failed to remove needs-senior-engineer label after a failed dispatch; the label stays present and this sweep's own conditional skip re-dispatches it once its grace window elapses"
                fi
                return 1
              fi
              return
            fi

            echo "PR #$n: conflicted with main; dispatching resolution round $round/$BUDGET (head $short)"
            gh pr comment "$n" --repo "$REPO" --body "$CONFLICT_MARKER (auto-dispatch round $round/$BUDGET, head $short). @claude-code-engineer this PR conflicts with the base branch. Merge origin/main, resolve the conflicts, and push."
          }

          handle_mergeable() {
            local n="$1" head="$2"
            local short="${head:0:8}"

            # Same errexit-disabled-by-`if !`-caller hazard as handle_conflicted above: an unchecked
            # read failure here would look like "not reviewed" or "no marker" and trigger a duplicate
            # review-actuator dispatch. Check each read's exit status explicitly and skip this PR for
            # this tick on failure rather than treating it as absence.
            local reviewed
            if ! reviewed=$(gh api "repos/$REPO/pulls/$n/reviews" --paginate | jq -s --arg head "$head" '
              def canon_login: if startswith("app/") then (.[4:] + "[bot]") else . end;
              add // [] | any(.commit_id == $head and ((.user.login | canon_login) == "codex-engineer[bot]"))
            '); then
              echo "::warning::PR #$n: reading review history failed; skipping this tick"
              return 1
            fi
            if [ "$reviewed" = "true" ]; then
              echo "PR #$n: head $short already has a completed codex review; nothing to do"
              return
            fi

            local last
            if ! last=$(last_marker_comment "$n" "$REVIEW_MARKER"); then
              echo "::warning::PR #$n: reading review-marker history failed; skipping this tick"
              return 1
            fi
            if [ "$last" != "null" ] && [ -n "$last" ]; then
              local prev_sha prev_ts elapsed
              prev_sha=$(jq -r '.body' <<<"$last" | grep -oE 'head [0-9a-f]{8}' | head -1 | awk '{print $2}')
              prev_ts=$(jq -r '.created_at' <<<"$last")
              if [ "$prev_sha" = "$short" ]; then
                elapsed=$(( now_epoch - $(date -u -d "$prev_ts" +%s) ))
                if [ "$elapsed" -lt "$REVIEW_GRACE_SECONDS" ]; then
                  echo "PR #$n: review actuator already re-fired ${elapsed}s ago against the same head; treating as still in flight, skipping this tick"
                  return
                fi
              fi
            fi

            echo "PR #$n: mergeable with no completed review at head $short; re-firing review-on-pr.yml via workflow_dispatch"
            # `handle_mergeable` runs inside `if ! handle_mergeable ...; then` below, which disables
            # errexit for the duration of this function call -- a failing `gh workflow run` would NOT
            # abort the function on its own. Check its exit status explicitly and bail out BEFORE
            # posting the marker comment, so the marker is only ever written after a successful dispatch
            # (an unchecked failure here would still record the in-flight marker and suppress retries for
            # up to REVIEW_GRACE_SECONDS despite no review having actually been launched).
            gh workflow run review-on-pr.yml --repo "$REPO" -f "pr_number=$n" || return 1
            gh pr comment "$n" --repo "$REPO" --body "$REVIEW_MARKER (head $short)." >/dev/null
          }

          # A present needs-senior-engineer label means either a summons is genuinely in flight/just
          # completed, or a prior dispatch/rollback silently failed and stranded the label
          # (agentic-engineering#65 rounds 9-10). senior-engineer.yml's loop guard now counts ADJUDICATION
          # COMMENTS, not label-application timeline events (same PR, round 10), which is what makes
          # re-dispatching here safe: a transport failure never produces an adjudication comment, so a retry
          # from this sweep can never inflate that guard's budget -- only a real completed summons can.
          handle_stranded_senior_engineer() {
            local n="$1"

            local label_ts
            if ! label_ts=$(gh api "repos/$REPO/issues/$n/events" --paginate | jq -s -r '
              add // [] | map(select(.event == "labeled" and .label.name == "needs-senior-engineer"))
                | sort_by(.created_at) | last | .created_at // empty
            '); then
              echo "::warning::PR #$n: reading needs-senior-engineer label history failed; skipping this tick"
              return 1
            fi
            if [ -z "$label_ts" ]; then
              echo "PR #$n: needs-senior-engineer set but no labeling event found in history; skipping this tick"
              return
            fi

            local comment_ts
            if ! comment_ts=$(gh api "repos/$REPO/issues/$n/comments" --paginate | jq -s -r '
              def canon_login: if startswith("app/") then (.[4:] + "[bot]") else . end;
              add // [] | map(select((.user.login | canon_login) == "senior-engineer-agent[bot]"))
                | sort_by(.created_at) | last | .created_at // empty
            '); then
              echo "::warning::PR #$n: reading senior-engineer comment history failed; skipping this tick"
              return 1
            fi

            if [ -n "$comment_ts" ] && [[ "$comment_ts" > "$label_ts" ]]; then
              echo "PR #$n: needs-senior-engineer set, but a senior-engineer-agent comment ($comment_ts) postdates the current label application ($label_ts); a summons is genuinely in flight or just completed, skipping"
              return
            fi

            local elapsed
            elapsed=$(( now_epoch - $(date -u -d "$label_ts" +%s) ))
            if [ "$elapsed" -lt "$SENIOR_ENGINEER_GRACE_SECONDS" ]; then
              echo "PR #$n: needs-senior-engineer applied ${elapsed}s ago with no adjudication comment since; within grace window, skipping this tick"
              return
            fi

            echo "PR #$n: needs-senior-engineer applied ${elapsed}s ago with no adjudication comment since -- summons likely never ran (dispatch or rollback failure); re-dispatching"
            if ! gh workflow run senior-engineer.yml --repo "$REPO" -f "pr_number=$n" -f "summoned_by=reconciler"; then
              echo "::warning::PR #$n: re-dispatch of stranded needs-senior-engineer summons failed; will retry next tick"
              return 1
            fi
          }

          # A plain `mapfile -t arr < <(cmd)` does NOT propagate cmd's exit status through `set -e` (process
          # substitution failures are invisible to the parent shell's error trap) -- a failing `gh pr list`
          # would silently look like "zero open PRs" and this tick would exit 0 having reconciled nothing
          # (same lesson as .aar-ci/checks.sh's own diff-capture step). Capture through a checked command
          # substitution instead.
          if ! numbers_output=$(gh pr list --repo "$REPO" --state open --author "app/claude-code-engineer" --json number --jq '.[].number' --limit 100); then
            echo "::error::gh pr list failed"
            exit 1
          fi
          numbers=()
          if [ -n "$numbers_output" ]; then
            mapfile -t numbers <<< "$numbers_output"
          fi
          echo "found ${#numbers[@]} open PR(s) authored by app/claude-code-engineer"

          for n in "${numbers[@]}"; do
            if ! pr=$(gh pr view "$n" --repo "$REPO" --json number,author,isCrossRepository,state,mergeable,headRefOid,labels); then
              echo "::warning::PR #$n: gh pr view failed; skipping this tick"
              continue
            fi
            author_canon=$(canonical_login "$(jq -r '.author.login' <<<"$pr")" 2>/dev/null || echo "")
            is_cross=$(jq -r '.isCrossRepository' <<<"$pr")
            state=$(jq -r '.state' <<<"$pr")

            # Re-verify fresh (belt-and-suspenders on top of the --author list filter above), same
            # predicate every other leg of this pipeline applies before acting on a PR.
            if [ "$author_canon" != "claude-code-engineer[bot]" ] || [ "$is_cross" != "false" ] || [ "$state" != "OPEN" ]; then
              echo "PR #$n: failed fresh re-verification (author=$author_canon cross=$is_cross state=$state); skipping"
              continue
            fi

            # needs-human means a person has already been paged for this PR -- the reconciler must not pile
            # a duplicate resolution-dispatch round on top of that. needs-dispatcher is this repo's own
            # escalation label (AGENTS.md's escalation section): the implementor already self-escalated as
            # blocked or contradicted, and the reconciler must not re-dispatch/re-escalate over that either.
            labels=$(jq -r '[.labels[].name] | join(",")' <<<"$pr")
            case ",$labels," in
              *,needs-human,*) echo "PR #$n: needs-human already set, skipping"; continue ;;
              *,needs-dispatcher,*) echo "PR #$n: needs-dispatcher already set, skipping"; continue ;;
            esac

            # needs-senior-engineer is CONDITIONAL, not an unconditional skip (agentic-engineering#65 round
            # 10): a present label alone doesn't prove a summons is actually running -- see
            # handle_stranded_senior_engineer above for the adjudication-comment check and re-dispatch.
            if [[ ",$labels," == *,needs-senior-engineer,* ]]; then
              if ! handle_stranded_senior_engineer "$n"; then
                echo "::warning::PR #$n: needs-senior-engineer stranded-check failed this tick"
              fi
              continue
            fi

            mergeable=$(jq -r '.mergeable' <<<"$pr")
            head_sha=$(jq -r '.headRefOid' <<<"$pr")

            # Retry a lazily-unresolved UNKNOWN a few times before moving on: never treat it as "fine"
            # (that would let a genuinely CONFLICTING PR sit unresolved until the next run), and never
            # dispatch on it directly (only a computed CONFLICTING may dispatch a resolution round).
            retry_attempt=1
            while [ "$mergeable" = "UNKNOWN" ] && [ "$retry_attempt" -lt "$MERGEABILITY_RETRY_ATTEMPTS" ]; do
              sleep "$MERGEABILITY_RETRY_SECONDS"
              if ! mergeable=$(gh pr view "$n" --repo "$REPO" --json mergeable --jq '.mergeable'); then
                echo "::warning::PR #$n: re-checking mergeability failed; leaving unresolved for this tick"
                mergeable="UNKNOWN"
                break
              fi
              retry_attempt=$((retry_attempt + 1))
            done

            # Fault-isolate each PR: one PR's transient API failure must not abort reconciliation of every
            # other PR in the same tick (the reconciler is level-triggered and self-healing -- the next
            # tick, ~10 minutes later, simply retries). `if ! fn; then` is the standard idiom for capturing
            # a function's exit status without an inner failure tripping the script-wide `set -e` abort.
            case "$mergeable" in
              CONFLICTING)
                if ! handle_conflicted "$n" "$head_sha"; then
                  echo "::warning::PR #$n: conflict-resolution handling failed this tick"
                fi
                ;;
              MERGEABLE)
                if ! handle_mergeable "$n" "$head_sha"; then
                  echo "::warning::PR #$n: review re-fire handling failed this tick"
                fi
                ;;
              *)
                echo "PR #$n: mergeable status '$mergeable' still not resolved by GitHub after $retry_attempt attempt(s); leaving for the next run"
                ;;
            esac
          done
